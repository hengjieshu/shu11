version: '3.8'

services:
  backend:
    build: ./backend
    container_name: multitable-backend
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: multitable-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
